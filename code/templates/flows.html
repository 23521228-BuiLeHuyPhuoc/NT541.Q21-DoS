<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bảng tổng quan luồng phát hiện tấn công DoS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #fff;
            color: #000;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .nav {
            text-align: center;
            margin-bottom: 15px;
        }

        .nav a {
            margin: 0 8px;
            color: #0066cc;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: #f4f4f4;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <h2>OpenFlow Rules (Switch s{{ dpid }})</h2>
    <div class="nav">
        <a href="/">Dashboard</a> | <a href="/alerts">Alerts</a> | <a href="/flows">Flows</a>
    </div>

    <table>
        <tr>
            <th>Priority</th>
            <th>Match</th>
            <th>Actions</th>
            <th>Bytes</th>
            <th>Packets</th>
        </tr>
        {% for flow in flows %}
        <tr>
            <td>{{ flow.priority }}</td>
            <td>
                <pre>{{ flow.match | tojson }}</pre>
            </td>
            <td>
                <pre>{{ flow.actions | tojson }}</pre>
            </td>
            <td>{{ flow.byte_count }}</td>
            <td>{{ flow.packet_count }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="5" style="text-align:center;">Khong co flow nao.</td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
