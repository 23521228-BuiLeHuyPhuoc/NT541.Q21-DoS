<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alerts - SDN DDoS Detection</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #fff; color: #000; }
        h2 { text-align: center; margin-bottom: 10px; }
        .nav { text-align: center; margin-bottom: 15px; }
        .nav a { margin: 0 8px; color: #0066cc; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 13px; }
        th { background: #f4f4f4; }
        .CRITICAL { color: red; font-weight: bold; }
        .WARN { color: orange; font-weight: bold; }
        .actions-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .action-box { padding: 10px; border: 1px solid #ccc; display: inline-block; }
        .action-box input { padding: 4px; }
        .action-box button { border: none; padding: 5px 12px; cursor: pointer; color: white; }
        .btn-block { background: #cc0000; }
        .btn-unblock { background: #009900; }
        .result { font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <h2>Danh sach Canh bao (Alerts)</h2>
    <div class="nav">
        <a href="/">Dashboard</a> | <a href="/alerts">Alerts</a> | <a href="/flows">Flows</a>
    </div>

    <div class="actions-row">
        <div class="action-box">
            <b>Chan IP:</b>
            <input type="text" id="blockIpInput" placeholder="VD: 10.0.1.10">
            <button class="btn-block" onclick="manualBlock()">Chan</button>
            <span id="blockResult" class="result" style="color:red;"></span>
        </div>
        <div class="action-box">
            <b>Go chan IP:</b>
            <input type="text" id="unblockIpInput" placeholder="VD: 10.0.1.10">
            <button class="btn-unblock" onclick="manualUnblock()">Go chan</button>
            <span id="unblockResult" class="result" style="color:green;"></span>
        </div>
    </div>

    <table>
        <tr><th>Time</th><th>Source IP</th><th>Attack Type</th><th>Severity</th><th>Action</th></tr>
        {% for alert in alerts %}
        <tr>
            <td>{{ alert.time }}</td>
            <td>{{ alert.src_ip }}</td>
            <td>{{ alert.attack }}</td>
            <td class="{{ alert.severity }}">{{ alert.severity }}</td>
            <td>{{ alert.action }}</td>
        </tr>
        {% else %}
        <tr><td colspan="5" style="text-align:center;">Chua co canh bao nao.</td></tr>
        {% endfor %}
    </table>

    <script>
        function manualBlock() {
            const ip = document.getElementById('blockIpInput').value;
            if(!ip) return alert("Nhap IP!");
            fetch('/api/block', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({src_ip: ip})
            }).then(r=>r.json()).then(d=>{
                document.getElementById('blockResult').innerText = d.ok ? "Da chan " + ip : "Loi: " + d.error;
            }).catch(()=>alert("Loi ket noi!"));
        }

        function manualUnblock() {
            const ip = document.getElementById('unblockIpInput').value;
            if(!ip) return alert("Nhap IP!");
            fetch('/api/unblock', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({src_ip: ip})
            }).then(r=>r.json()).then(d=>{
                document.getElementById('unblockResult').innerText = d.ok ? "Da go chan " + ip : "Loi: " + d.error;
            }).catch(()=>alert("Loi ket noi!"));
        }
    </script>
</body>
</html>
